<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendSense | Technology Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .trend-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .trend-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .alert-pre {
            background-color: #fff7ed; 
            color: #c2410c; 
            border-left: 8px solid #f97316; 
        }
        .alert-trending {
            background-color: #f0fdf4; 
            color: #15803d; 
            border-left: 8px solid #22c55e;
        }
        .alert-stable {
            background-color: #eff6ff; 
            color: #1d4ed8; 
            border-left: 8px solid #3b82f6;
        }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-900">

    <div id="app" class="max-w-5xl mx-auto">
        <header class="mb-12 text-center">
            <div class="inline-flex items-center justify-center p-3 mb-4 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-200">
                <i data-lucide="zap" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-5xl font-black tracking-tight text-slate-900 mb-4">TrendSense</h1>
            
            <div class="max-w-xs mx-auto mb-4 relative">
                <select id="niche-selector" class="block w-full appearance-none bg-white border border-slate-200 text-slate-700 py-3 px-4 pr-8 rounded-xl leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm font-semibold cursor-pointer">
                    <option value="trend_report_agents.json">AI Agents & Multi-Agent Systems</option>
                    <option value="trend_report_rag.json">RAG & Vector Databases</option>
                    <option value="trend_report_web3.json">Web3 & DeFi</option>
                    <option value="trend_report_devops.json">DevOps & Cloud Native</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </div>
            </div>

            <p id="niche-subtitle" class="text-xl text-slate-500 font-medium tracking-tight italic">Snapshot Loading...</p>
            <div class="mt-4 flex items-center justify-center space-x-2 text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">
                <i data-lucide="clock" class="w-3 h-3"></i>
                <span id="generated-time">Last update: --</span>
            </div>
        </header>
        
        <div id="alert-banner" class="p-6 mb-10 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row items-center transition-all duration-500">
            <div class="mb-4 md:mb-0 md:mr-6 p-4 bg-white rounded-full shadow-inner">
                <i id="alert-icon" data-lucide="bell" class="w-10 h-10"></i>
            </div>
            <div class="text-center md:text-left">
                <h2 id="alert-status" class="text-2xl font-black uppercase tracking-tight leading-none mb-1">Checking Signals...</h2>
                <p id="alert-message" class="text-base font-medium opacity-80"></p>
            </div>
        </div>

        <div class="bg-slate-900 rounded-3xl p-8 mb-12 text-white relative overflow-hidden shadow-2xl">
            <div class="relative z-10">
                <div class="flex items-center mb-4 text-indigo-400">
                    <i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>
                    <span class="text-xs font-black uppercase tracking-[0.2em]">Analyst Executive Summary</span>
                </div>
                <p id="human-summary" class="text-xl md:text-2xl font-medium leading-relaxed"></p>
            </div>
            <i data-lucide="cpu" class="absolute right-[-20px] bottom-[-20px] w-64 h-64 text-slate-800 opacity-40 -rotate-12"></i>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            
            <div class="lg:col-span-2">
                <div class="flex items-center justify-between mb-6">
                    <h3 id="trends-list-heading" class="text-2xl font-black text-slate-800 tracking-tight">Micro-Trends</h3>
                    <span class="px-3 py-1 bg-indigo-100 text-indigo-700 text-[10px] font-black uppercase rounded-full tracking-widest">Academic Signal</span>
                </div>
                
                <div id="trends-list" class="space-y-6">
                    </div>
            </div>

            <div class="space-y-10">
                
                <div>
                    <div class="flex items-center mb-6">
                        <i data-lucide="git-branch" class="w-6 h-6 mr-3 text-emerald-500"></i>
                        <h4 class="text-lg font-black text-slate-800 tracking-tight uppercase">Dev Momentum</h4>
                    </div>
                    <div id="developer-list" class="space-y-3"></div>
                </div>

                <div>
                    <div class="flex items-center mb-6">
                        <i data-lucide="message-square" class="w-6 h-6 mr-3 text-orange-500"></i>
                        <h4 class="text-lg font-black text-slate-800 tracking-tight uppercase">Market Buzz</h4>
                    </div>
                    <div id="buzz-list" class="space-y-3"></div>
                </div>

                <div class="bg-gradient-to-br from-amber-400 to-orange-500 p-6 rounded-3xl text-white shadow-xl shadow-orange-100">
                    <span class="text-[10px] font-black uppercase tracking-widest opacity-80 underline decoration-2 underline-offset-4 mb-2 block">Recommendation</span>
                    <h4 id="sponsor-title" class="text-xl font-black mt-2 leading-tight">Master This Trend</h4>
                    <p class="text-sm mt-2 font-medium leading-snug opacity-90">Deep dive into the frameworks driving these specific micro-trends with our partner path.</p>
                    <button class="w-full mt-5 bg-white text-orange-600 font-black py-3 rounded-xl hover:bg-slate-50 transition active:scale-95 uppercase text-xs tracking-widest shadow-md">
                        Explore Learning Path
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);
        
        // Default file on load
        let currentDataSource = $('niche-selector').value;

        // Listen for dropdown changes
        $('niche-selector').addEventListener('change', (e) => {
            currentDataSource = e.target.value;
            loadDataAndRender();
        });

        async function loadDataAndRender() {
            try {
                // Fetch report with cache-busting
                const response = await fetch(currentDataSource + `?v=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Intelligence data not found for this sector.");
                
                const report = await response.json();
                renderDashboard(report);

            } catch (error) {
                console.error("Dashboard Error:", error);
                $('app').innerHTML = `
                    <div class="max-w-xl mx-auto p-12 text-center bg-white border rounded-3xl shadow-xl mt-10">
                        <i data-lucide="alert-circle" class="w-16 h-16 mx-auto text-red-500 mb-4"></i>
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight">Intelligence Offline</h2>
                        <p class="text-slate-500 mt-2 font-medium">Data file not found (${currentDataSource}). Please run the Python collector script.</p>
                        <button onclick="window.location.reload()" class="mt-6 px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold">Reload Dashboard</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function renderDashboard(report) {
            const academicData = report.signals.academic;
            const developerData = report.signals.developer;
            const buzzData = report.signals.buzz;
            
            // --- DYNAMIC HEADING LOGIC ---
            $('niche-subtitle').textContent = `Predictive Platform for ${report.niche}`;
            $('trends-list-heading').textContent = `Emerging ${report.niche.split('&')[0].trim()} Micro-Trends`;
            $('generated-time').textContent = `Snapshot: ${new Date(report.report_generated_time).toLocaleString()}`;
            $('human-summary').textContent = report.human_summary || "AI pattern recognition running... significant volume shifts detected in open-source logic layers.";
            
            // Alert Banner
            const banner = $('alert-banner');
            const alertStatus = $('alert-status');
            const alertMessage = $('alert-message');
            const alertIcon = $('alert-icon');
            
            banner.classList.remove('alert-pre', 'alert-trending', 'alert-stable');

            if (report.alert_status === 'TRENDING_NOW') {
                banner.classList.add('alert-trending');
                alertStatus.textContent = `TRENDING NOW • Score ${report.final_score.toFixed(2)}`;
                alertIcon.setAttribute('data-lucide', 'rocket');
            } else if (report.alert_status === 'PRE_TREND_ALERT') {
                banner.classList.add('alert-pre');
                alertStatus.textContent = `PRE-TREND ALERT • Score ${report.final_score.toFixed(2)}`;
                alertIcon.setAttribute('data-lucide', 'zap');
            } else {
                banner.classList.add('alert-stable');
                alertStatus.textContent = `STABLE SIGNAL • Score ${report.final_score.toFixed(2)}`;
                alertIcon.setAttribute('data-lucide', 'check-circle');
            }
            alertMessage.textContent = report.alert_message || "Tracking consistent repository and academic baseline data.";

            // Trends List
            const trendsList = $('trends-list');
            trendsList.innerHTML = academicData.data.map(paper => `
                <div class="p-6 bg-white rounded-2xl trend-card border border-slate-100 border-l-[12px] border-l-indigo-600">
                    <h5 class="text-xl font-black text-slate-800 leading-tight mb-3 tracking-tight">${paper.title}</h5>
                    <p class="text-slate-600 text-sm leading-relaxed mb-6 font-medium italic opacity-90">
                        "${paper.summary}"
                    </p>
                    <div class="flex items-center justify-between border-t border-slate-50 pt-4">
                        <span class="text-[9px] font-black uppercase text-slate-400 tracking-widest">Source: arXiv Global</span>
                        <a href="${paper.link}" target="_blank" class="text-indigo-600 text-xs font-black hover:text-indigo-800 transition flex items-center uppercase tracking-widest">
                            Access Discovery <i data-lucide="external-link" class="w-3 h-3 ml-2"></i>
                        </a>
                    </div>
                </div>
            `).join('');

            // Developer List
            const developerList = $('developer-list');
            developerList.innerHTML = developerData.data.map(repo => {
                const isPositive = parseFloat(repo.increase_pct) > 0;
                return `
                    <div class="p-4 bg-white rounded-2xl border border-slate-100 flex items-center justify-between trend-card">
                        <div>
                            <p class="font-black text-slate-800 text-sm uppercase tracking-tight">${repo.repo_name.split('/').pop()}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${repo.recent_commits} commits / 7d</p>
                        </div>
                        <div class="flex items-center ${isPositive ? 'text-emerald-600' : 'text-slate-400'} font-black text-xs">
                            <i data-lucide="${isPositive ? 'trending-up' : 'minus'}" class="w-4 h-4 mr-1"></i>
                            ${repo.increase_pct}
                        </div>
                    </div>
                `;
            }).join('');
            
            // Industry Buzz
            const buzzList = $('buzz-list');
            buzzList.innerHTML = buzzData.data.map(buzz => `
                <div class="p-4 bg-white rounded-2xl border border-slate-100 trend-card">
                    <p class="font-bold text-slate-700 text-xs leading-snug">${buzz.title}</p>
                    <div class="mt-2 text-right">
                        <span class="px-2 py-0.5 bg-indigo-50 text-indigo-700 text-[8px] font-black uppercase rounded tracking-tighter">${buzz.source}</span>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        // Initialize on page load
        loadDataAndRender();
    </script>
</body>
</html>
